<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Electronic Hive</title>
    <script>
      // GitHub Pages SPA fallback — encode path into ?/ query and redirect to root.
      // pathSegmentsToKeep = 1 because the site is hosted under /electronic-hive/.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
